services:
  # Cache Redis (Key-Value)
  - type: keyvalue
    name: babygoo-redis
    plan: free
    region: ohio
    ipAllowList: []
    
  # Servidor Backend de Medusa
  - type: web
    name: babygoo-backend
    env: node
    plan: starter
    region: ohio
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: babygoo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: babygoo-redis
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      # Variables de CORS y Stripe (Debes completarlas en el dashboard de Render luego)
      - key: STORE_CORS
        value: "https://tudominio-storefront.com"
      - key: ADMIN_CORS
        value: "https://tudominio-admin.com"
      - key: AUTH_CORS
        value: "https://tudominio-admin.com,https://tudominio-storefront.com"
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

# Base de datos PostgreSQL
databases:
  - name: babygoo-db
    databaseName: medusa_ecomm
    user: medusa
    plan: starter
    region: ohio
